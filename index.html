<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindForge — Working Memory Trainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1 id="header-title" onclick="showHome()">MindForge</h1>
      <p id="header-subtitle">Train your working memory</p>
    </header>

    <main id="home" class="screen active">
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-value" id="total-sessions">0</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="best-streak">0</span>
          <span class="stat-label">Best Streak</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="today-time">0m</span>
          <span class="stat-label">Today</span>
        </div>
      </div>

      <div class="game-grid">
        <button class="game-card" onclick="startGame('sequence')">
          <div class="game-icon">🧩</div>
          <div class="game-info">
            <h3>Sequence Memory</h3>
            <p>Remember the pattern as it grows</p>
          </div>
          <div class="game-best" id="best-sequence">—</div>
        </button>

        <button class="game-card" onclick="startGame('number')">
          <div class="game-icon">🔢</div>
          <div class="game-info">
            <h3>Number Memory</h3>
            <p>Recall increasingly long numbers</p>
          </div>
          <div class="game-best" id="best-number">—</div>
        </button>

        <button class="game-card" onclick="startGame('visual')">
          <div class="game-icon">👁️</div>
          <div class="game-info">
            <h3>Visual Memory</h3>
            <p>Remember highlighted tiles</p>
          </div>
          <div class="game-best" id="best-visual">—</div>
        </button>

        <button class="game-card" onclick="startGame('nback')">
          <div class="game-icon">🧠</div>
          <div class="game-info">
            <h3>N-Back</h3>
            <p>Was this the same as N steps ago?</p>
          </div>
          <div class="game-best" id="best-nback">—</div>
        </button>
      </div>
    </main>

    <!-- Sequence Memory Game -->
    <div id="sequence-screen" class="screen">
      <div class="game-header">
        <h2>Sequence Memory</h2>
        <div class="level-display">Level <span id="seq-level">1</span></div>
      </div>
      <div class="game-status" id="seq-status">Watch the sequence</div>
      <div class="grid-3x3" id="seq-grid"></div>
      <div class="game-actions">
        <button class="btn btn-secondary" onclick="showHome()">Quit</button>
      </div>
    </div>

    <!-- Number Memory Game -->
    <div id="number-screen" class="screen">
      <div class="game-header">
        <h2>Number Memory</h2>
        <div class="level-display">Level <span id="num-level">1</span></div>
      </div>
      <div id="num-display" class="number-display"></div>
      <div id="num-input-area" class="number-input-area hidden">
        <input type="number" id="num-input" class="num-input" placeholder="Enter the number" inputmode="numeric" autocomplete="off">
        <button class="btn btn-primary" onclick="checkNumber()">Submit</button>
      </div>
      <div id="num-result" class="number-result hidden"></div>
      <div class="game-actions">
        <button class="btn btn-secondary" onclick="showHome()">Quit</button>
      </div>
    </div>

    <!-- Visual Memory Game -->
    <div id="visual-screen" class="screen">
      <div class="game-header">
        <h2>Visual Memory</h2>
        <div class="level-display">Level <span id="vis-level">1</span></div>
      </div>
      <div class="game-status" id="vis-status">Memorize the tiles</div>
      <div id="vis-grid" class="vis-grid"></div>
      <div class="game-actions">
        <button class="btn btn-secondary" onclick="showHome()">Quit</button>
      </div>
    </div>

    <!-- N-Back Game -->
    <div id="nback-screen" class="screen">
      <div class="game-header">
        <h2>N-Back</h2>
        <div class="level-display"><span id="nb-n">2</span>-Back</div>
      </div>
      <div class="nback-progress">
        <span id="nb-round">0</span> / <span id="nb-total">20</span>
      </div>
      <div class="nback-display">
        <div class="nback-grid" id="nb-grid"></div>
      </div>
      <div class="nback-controls">
        <button class="btn btn-match" id="nb-match-btn" onclick="nbackResponse(true)">Match</button>
        <button class="btn btn-no-match" id="nb-skip-btn" onclick="nbackResponse(false)">No Match</button>
      </div>
      <div class="nback-score">
        Accuracy: <span id="nb-accuracy">—</span>
      </div>
      <div class="game-actions">
        <button class="btn btn-secondary" onclick="showHome()">Quit</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results-container">
        <div class="results-icon" id="results-icon">🎯</div>
        <h2 id="results-title">Nice Work!</h2>
        <div class="results-score">
          <span class="results-label">Score</span>
          <span class="results-value" id="results-value">0</span>
        </div>
        <div class="results-detail" id="results-detail"></div>
        <div class="results-actions">
          <button class="btn btn-primary" id="results-retry">Try Again</button>
          <button class="btn btn-secondary" onclick="showHome()">Home</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
